# Mini-Wiki 配置文件

generation:
  language: zh          # zh / en / both
  include_diagrams: true
  include_examples: true
  link_to_source: true
  max_file_size: 100000

plugins:
  allow_remote_install: false
  allow_http: false
  max_download_bytes: 25000000
  allowed_hosts:
    - github.com
    - codeload.github.com
    - raw.githubusercontent.com

exclude:
  - node_modules
  - .git
  - dist
  - build
  - coverage
  - __pycache__
  - venv
  - "*.test.ts"
  - "*.test.tsx"
  - "*.spec.ts"
  - "*.spec.js"
  - "*.bak"
