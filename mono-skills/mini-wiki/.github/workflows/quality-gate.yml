name: quality-gate

on:
  push:
  pull_request:

jobs:
  tests-and-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip pyyaml

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -v

      - name: Sample quality gate
        run: |
          temp_dir="$(mktemp -d)"
          python scripts/init_wiki.py "$temp_dir"
          python scripts/check_quality.py "$temp_dir/.mini-wiki"
